services:
  prospeo:
    build: .
    ports:
      - "4002:3000"
    environment:
      - PROSPEO_API_KEY=${PROSPEO_API_KEY}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - prospeo-net

networks:
  prospeo-net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.128.0/24
